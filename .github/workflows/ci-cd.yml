# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — API Gateway (api-gateway-cuidadoseguro)
#
# GitHub Secrets requeridos (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME    → usuario Docker Hub  (karipilo)
#   DOCKERHUB_TOKEN       → Access Token Docker Hub
#   AWS_ACCESS_KEY_ID     → credenciales AWS Lab
#   AWS_SECRET_ACCESS_KEY
#   AWS_SESSION_TOKEN
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: api-gateway
  SERVICE_PORT: 8080

jobs:
  # ── 1. Build y Tests ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Instalar jwt-common
        run: mvn install -f jwt-common/pom.xml -DskipTests -q

      - name: Compilar con Maven
        run: mvn clean compile -B -q

      - name: Ejecutar tests
        run: mvn test -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Generar reporte JaCoCo
        run: mvn jacoco:report -B -q
        continue-on-error: true

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ── 2. Build y Push imagen Docker ──────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ── 3. Deploy a AWS ECS ─────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy a ECS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Forzar nuevo deploy en ECS
        run: |
          aws ecs update-service \
            --cluster cuidado-seguro-cluster \
            --service api-gateway-service \
            --force-new-deployment \
            --region us-east-1
