server.port=8080
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth/(?<segment>.*), /auth/${segment}
spring.cloud.gateway.globalcors.corsConfigurations.[0].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[0].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[0].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[0].allowCredentials=true

spring.cloud.gateway.routes[1].id=paciente-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/pacientes/**
spring.cloud.gateway.globalcors.corsConfigurations.[1].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[1].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[1].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[1].allowCredentials=true
spring.cloud.gateway.routes[2].id=medical-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/medical/**,/rabbit/**,/controles/**,/evoluciones/**,/examenes/**,/fichas/**,/indicaciones/**,/medicamentos/**,/signos-vitales/**
spring.cloud.gateway.globalcors.corsConfigurations.[2].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[2].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[2].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[2].allowCredentials=true

